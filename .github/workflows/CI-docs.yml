name: meshRW docs

on:
  push:
    branches: ['**']
    paths:
      - 'docs/**'
      - 'docs/conf.py'
      - 'docs/index.md'
      - 'README.md'
      - 'pyproject.toml'
      - 'meshRW/**/*.py'
  pull_request:
    branches: ['**']
    paths:
      - 'docs/**'
      - 'docs/conf.py'
      - 'docs/index.md'
      - 'README.md'
      - 'pyproject.toml'
      - 'meshRW/**/*.py'
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]

      - name: Build docs (strict)
        run: sphinx-build -W --keep-going -b html docs docs/_build/html
